<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Salão de Beleza</title>
</head>

<body>
    <h1>Salão de Beleza</h1>
    <p>Página de Agendamentos online</p>
    <section>
        <h2>Agendamento</h2>
        <form>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
            </div>
            <div>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="Seu telefone" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Seu email" required>
            </div>
            <div>
                <label for="data">Data</label>
                <input type="date" id="data" name="data" required>
            </div>
            <div>
                <label for="horario">Horário</label>
                <input type="time" id="horario" name="horario" required>
            </div>

            <div>
                <label for="servico">Tipo deServiço:</label>
                <select id="servico" name="servico" required>
                  <option value="">Selecione um serviço</option>
            <option value="corte">Corte de cabelo</option>
            <option value="coloracao">Coloração</option>
            <option value="escova">Escova</option>
            <option value="manicure">Manicure</option>
            <option value="tratamento">Tratamento capilar</option>
                </select>
            </div><br><br>

            <input type="submit" value="Agendar">
        </form>
    </section>

</body>

</html>
