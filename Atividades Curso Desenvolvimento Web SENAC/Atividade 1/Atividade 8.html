<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Tela de login</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #faf6f3;
        }

        h1 {
            text-align: center;
            margin-top: 0px;
            color: #3d2c1b;
            padding: 0px;
            border-radius: 10px;
        }

        form {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fffdfc;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: 3px solid #b8e8ff;

        }

        header {
            text-align: center;
            margin-bottom: 20px;
            background-color: #b8e8ff;
            padding: 20px;
        }

        button {
      
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #b8e8ff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px auto;

        }

        button:hover {
            background-color: #a0d4f0;
        }

        label {
            display: block;
            margin: 10px 0px 10px 0px;
            color: #3d2c1b;
            font-weight: bold;
            border: 2px solid #b8e8ff;
            border-radius: 5px;
            font-size: 22px;
        }

        input{
            width: 100%;
            padding: 8px;
            margin: 10px 0px 10px 0px;
            border: 2px solid #b8e8ff;
            border-radius: 5px;
        }

        h2{
            text-align: left;
            margin: 10px 0px 20px 0px;
            color: #3d2c1b;
            border: 2px solid #b8e8ff;
            border-radius: 5px;
        }

    </style>

</head>

<body>

    <header>
        <h1>Bem-vindo à Sorveteria do Rodrigo</h1>
    </header>

    <form>
        <h2>Login</h2>
        <label>E-mail</label>
        <input type="email">
        <br>
        <label>Senha</label>
        <input type="password">
        <br>
        <button>Entrar</button>
    </form>

</body>

</html>
