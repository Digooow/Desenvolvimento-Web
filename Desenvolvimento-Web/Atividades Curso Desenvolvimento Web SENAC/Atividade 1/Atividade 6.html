<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salão de Beleza - Cemitério Gótico</title>
    <!-- Fonte gótica do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET E FUNDO ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            font-family: 'Cinzel', 'Georgia', serif;
            background: #0d0a08;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(60, 30, 20, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(40, 20, 30, 0.3) 0%, transparent 50%),
                repeating-linear-gradient(45deg,
                    transparent 0px,
                    transparent 40px,
                    rgba(255, 255, 255, 0.01) 40px,
                    rgba(255, 255, 255, 0.01) 41px);
            position: relative;
            color: #d4c9b8;
        }

        /* ===== ELEMENTOS DECORATIVOS DE FUNDO ===== */
        body::before {
            content: '🕊️';
            position: fixed;
            top: 30px;
            left: 30px;
            font-size: 3rem;
            opacity: 0.08;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        body::after {
            content: '🕯️';
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 3.5rem;
            opacity: 0.08;
            transform: rotate(10deg);
            pointer-events: none;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(20, 15, 13, 0.92);
            padding: 40px 45px 50px;
            border: 3px solid #5a3d31;
            border-radius: 12px;
            position: relative;
            box-shadow:
                0 0 40px rgba(60, 30, 20, 0.3),
                inset 0 0 60px rgba(40, 20, 15, 0.5),
                0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(2px);
            transition: box-shadow 0.4s ease;
        }

        .container:hover {
            box-shadow:
                0 0 60px rgba(80, 40, 30, 0.4),
                inset 0 0 80px rgba(40, 20, 15, 0.6),
                0 10px 40px rgba(0, 0, 0, 0.9);
        }

        /* ===== BORDA DECORATIVA COM CRUZES ===== */
        .container::before {
            content: '✟ ✟ ✟ ✟ ✟';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: #5a3d31;
            font-size: 1.2rem;
            letter-spacing: 8px;
            background: #0d0a08;
            padding: 0 15px;
            white-space: nowrap;
        }

        .container::after {
            content: '✟ ✟ ✟ ✟ ✟';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: #5a3d31;
            font-size: 1.2rem;
            letter-spacing: 8px;
            background: #0d0a08;
            padding: 0 15px;
            white-space: nowrap;
        }

        /* ===== TÍTULOS ===== */
        h1 {
            font-family: 'MedievalSharp', 'Cinzel', cursive;
            font-size: 3.2rem;
            font-weight: 700;
            text-align: center;
            color: #b8a28c;
            text-shadow: 0 0 20px rgba(120, 80, 60, 0.3);
            letter-spacing: 4px;
            margin-bottom: 4px;
            position: relative;
        }

        h1::after {
            content: '⚰️';
            position: absolute;
            right: -10px;
            top: -10px;
            font-size: 1.8rem;
            opacity: 0.2;
            transform: rotate(10deg);
        }

        h1::before {
            content: '⚰️';
            position: absolute;
            left: -10px;
            top: -10px;
            font-size: 1.8rem;
            opacity: 0.2;
            transform: rotate(-10deg);
        }

        .subtitle {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
            color: #8a7a6a;
            letter-spacing: 3px;
            border-top: 1px solid #3d2e26;
            border-bottom: 1px solid #3d2e26;
            padding: 10px 0;
            margin-bottom: 30px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .subtitle span {
            color: #a0806a;
            font-weight: 700;
        }

        /* ===== SEÇÃO ===== */
        section {
            margin-top: 10px;
        }

        section h2 {
            font-family: 'MedievalSharp', 'Cinzel', cursive;
            font-size: 2.2rem;
            color: #b8a28c;
            text-align: center;
            text-shadow: 0 0 15px rgba(120, 80, 60, 0.2);
            border-bottom: 2px dashed #4a342a;
            padding-bottom: 12px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            position: relative;
        }

        section h2::before {
            content: '†';
            margin-right: 12px;
            color: #6a4a3a;
            font-size: 1.8rem;
            opacity: 0.5;
        }

        section h2::after {
            content: '†';
            margin-left: 12px;
            color: #6a4a3a;
            font-size: 1.8rem;
            opacity: 0.5;
        }

        /* ===== FORMULÁRIO ===== */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        form div {
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            padding-left: 5px;
            border-left: 2px solid transparent;
            transition: border-color 0.3s;
        }

        form div:hover {
            border-left-color: #6a4a3a;
        }

        label {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: #b8a28c;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label::before {
            content: '❧';
            color: #5a3d31;
            font-size: 1.2rem;
            opacity: 0.6;
        }

        input,
        select {
            background: rgba(30, 22, 18, 0.8);
            border: 1px solid #3d2e26;
            border-radius: 6px;
            padding: 12px 16px;
            color: #d4c9b8;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #8a6a52;
            background: rgba(40, 28, 22, 0.9);
            box-shadow: 0 0 20px rgba(120, 80, 60, 0.15), inset 0 0 20px rgba(120, 80, 60, 0.05);
        }

        input::placeholder {
            color: #5a4a3a;
            font-style: italic;
            opacity: 0.6;
        }

        select option {
            background: #1a1410;
            color: #d4c9b8;
        }

        /* ===== BOTÃO ===== */
        input[type="submit"] {
            background: transparent;
            border: 2px solid #5a3d31;
            color: #b8a28c;
            padding: 14px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            background: rgba(30, 20, 15, 0.4);
            box-shadow: 0 0 20px rgba(60, 30, 20, 0.1);
        }

        input[type="submit"]:hover {
            background: rgba(90, 61, 49, 0.3);
            border-color: #8a6a52;
            color: #e8d9c8;
            box-shadow: 0 0 40px rgba(120, 80, 60, 0.2), inset 0 0 30px rgba(120, 80, 60, 0.05);
            transform: scale(1.02);
            letter-spacing: 6px;
        }

        input[type="submit"]:active {
            transform: scale(0.98);
        }

        /* ===== RODAPÉ DECORATIVO ===== */
        .footer-gothic {
            margin-top: 35px;
            text-align: center;
            font-size: 0.8rem;
            color: #5a4a3a;
            border-top: 1px solid #2d221c;
            padding-top: 18px;
            letter-spacing: 2px;
            font-family: 'Cinzel', serif;
            opacity: 0.6;
        }

        .footer-gothic span {
            color: #8a6a52;
            font-weight: 700;
        }

        .footer-gothic .cross {
            color: #5a3d31;
            margin: 0 6px;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 650px) {
            .container {
                padding: 25px 18px 30px;
            }

            h1 {
                font-size: 2.4rem;
            }

            h1::before,
            h1::after {
                display: none;
            }

            .container::before,
            .container::after {
                font-size: 0.8rem;
                letter-spacing: 4px;
                padding: 0 10px;
            }

            section h2 {
                font-size: 1.8rem;
            }

            section h2::before,
            section h2::after {
                font-size: 1.2rem;
            }

            input,
            select {
                padding: 10px 14px;
                font-size: 0.95rem;
            }

            input[type="submit"] {
                font-size: 1rem;
                padding: 12px 20px;
            }

            .subtitle {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 420px) {
            .container {
                padding: 20px 12px 25px;
            }

            h1 {
                font-size: 1.8rem;
            }

            section h2 {
                font-size: 1.4rem;
            }

            label {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Salão de Beleza</h1>
        <div class="subtitle"><span>✟</span> agendamentos online <span>✟</span></div>

        <section>
            <h2>Agendamento</h2>
            <form>
                <div>
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>
                <div>
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Seu telefone" required>
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Seu email" required>
                </div>
                <div>
                    <label for="data">Data</label>
                    <input type="date" id="data" name="data" required>
                </div>
                <div>
                    <label for="horario">Horário</label>
                    <input type="time" id="horario" name="horario" required>
                </div>
                <div>
                    <label for="servico">Tipo de Serviço</label>
                    <select id="servico" name="servico" required>
                        <option value="">Selecione um serviço</option>
                        <option value="corte">Corte de cabelo</option>
                        <option value="coloracao">Coloração</option>
                        <option value="escova">Escova</option>
                        <option value="manicure">Manicure</option>
                        <option value="tratamento">Tratamento capilar</option>
                    </select>
                </div>

                <input type="submit" value="Agendar">
            </form>
        </section>

        <div class="footer-gothic">
            <span class="cross">✟</span> <span>In memoria</span> <span class="cross">✟</span>
            <br>
            <span style="font-size:0.7rem; opacity:0.5;">beleza eterna sob a lua</span>
        </div>

    </div>

</body>
</html>
